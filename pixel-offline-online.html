<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel — Desktop Pet</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Orbitron:wght@700;900&family=Poppins:wght@400;600;700;800&family=Inter:wght@400;600;700;800&family=Comic+Neue:ital,wght@0,400;0,700&display=swap');

:root {
  --bg: #0d0d1a;
  --surface: #161628;
  --surface2: #1e1e35;
  --accent: #d966ff;
  --accent2: #00e5ff;
  --text: #eeeeff;
  --text-dim: rgba(238,238,255,0.42);
  --glow: rgba(217,102,255,0.4);
  --chat-panel-bg: rgba(13,13,26,0.97);
  --primary-w: 1920px;
  --primary-h: 1080px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  width: 100vw; height: 100vh;
  overflow: hidden;
  font-family: 'Nunito', sans-serif;
  color: var(--text);
  user-select: none;
}

/* ── BACKGROUND CANVAS ── */
#bg-canvas {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  z-index: 0;
}

/* ── CLOCK TOP-LEFT ── */
#clock-widget {
  position: fixed;
  top: 36px; left: 44px;
  z-index: 5;
  pointer-events: none;
}
#clock-time {
  font-size: 64px;
  font-weight: 900;
  letter-spacing: -2px;
  color: rgba(255,255,255,0.9);
  text-shadow: 0 0 40px rgba(217,102,255,0.45);
  line-height: 1;
}
#clock-date {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.14em;
  color: rgba(238,238,255,0.4);
  margin-top: 6px;
  text-transform: uppercase;
}

/* ══════════════════════════════
   PET — bottom RIGHT corner
══════════════════════════════ */
#pet-zone {
  position: fixed;
  left: 0;
  top: 0;
  z-index: 30;
  width: 200px;
  display: flex;
  flex-direction: column;
  align-items: center;
  pointer-events: none;
  will-change: transform;
}
#pet-wrap, #name-tag, #mood-icon, #speech-bubble {
  pointer-events: auto;
}

/* Speech bubble above pet — points DOWN-right */
#speech-bubble {
  position: relative;
  background: #fff;
  border-radius: 18px;
  padding: 10px 30px 10px 16px;
  max-width: 260px;
  min-width: 80px;
  font-size: 13px;
  font-weight: 800;
  color: #1a1030;
  line-height: 1.5;
  text-align: center;
  margin-bottom: 10px;
  box-shadow: 0 6px 28px rgba(217,102,255,0.3);
  word-break: break-word;
  opacity: 0;
  transform: translateY(8px) scale(0.93);
  transition: opacity 0.32s cubic-bezier(.34,1.56,.64,1),
              transform 0.32s cubic-bezier(.34,1.56,.64,1);
  pointer-events: none;
}
#bubble-close {
  position: absolute;
  top: 5px; right: 7px;
  background: none; border: none;
  font-size: 13px; line-height: 1;
  color: rgba(26,16,48,0.4);
  cursor: pointer; padding: 2px 4px;
  pointer-events: auto;
  transition: color 0.15s;
}
#bubble-close:hover { color: rgba(26,16,48,0.85); }
#speech-bubble.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}
/* Tail pointing down */
#speech-bubble::after {
  content: '';
  position: absolute;
  bottom: -9px;
  left: 50%;
  transform: translateX(-50%);
  border: 6px solid transparent;
  border-top-color: #fff;
  border-bottom: none;
}

/* Typing dots */
.dot-wrap { display:flex; gap:5px; justify-content:center; align-items:center; height:16px; }
.dot { width:7px; height:7px; background:#b0a0c0; border-radius:50%; animation:dotB 1.1s ease-in-out infinite; }
.dot:nth-child(2){ animation-delay:.18s }
.dot:nth-child(3){ animation-delay:.36s }
@keyframes dotB { 0%,80%,100%{transform:translateY(0);opacity:.5} 40%{transform:translateY(-7px);opacity:1} }

/* Pet canvas */
#pet-wrap {
  width: 160px; height: 160px;
  cursor: pointer;
  filter: drop-shadow(0 0 22px var(--glow));
  animation: petFloat 3.2s ease-in-out infinite;
}
#pet-wrap:hover { filter: drop-shadow(0 0 40px rgba(217,102,255,0.8)); }
#pet-canvas { width:100%; height:100%; display:block; }
@keyframes petFloat {
  0%,100%{ transform:translateY(0) }
  50%{ transform:translateY(-13px) }
}

/* Shadow under pet */
#pet-shadow {
  width: 100px; height: 16px;
  background: radial-gradient(ellipse, rgba(217,102,255,0.32) 0%, transparent 70%);
  margin-top: -5px;
  animation: shadowP 3.2s ease-in-out infinite;
}
@keyframes shadowP {
  0%,100%{ transform:scaleX(1); opacity:.6 }
  50%{ transform:scaleX(.65); opacity:.25 }
}

/* Name tag */
#name-tag {
  font-size: 10px; font-weight: 900;
  letter-spacing: 0.26em;
  color: var(--accent);
  text-shadow: 0 0 10px var(--accent);
  margin-top: 3px; margin-bottom: 6px;
}

/* Open pet selector button */
#open-pet-selector {
  position: fixed;
  bottom: 18px;
  left: calc(var(--primary-w) - 18px);
  transform: translateX(-100%);
  z-index: 31;
  font-family: 'Nunito', sans-serif;
  font-size: 9px; font-weight: 900;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent);
  background: rgba(10,10,30,0.72);
  border: 1px solid rgba(217,102,255,0.28);
  border-radius: 999px;
  padding: 6px 16px;
  cursor: pointer;
  opacity: 0.65;
  transition: opacity 0.2s, border-color 0.2s, box-shadow 0.2s;
}
#open-pet-selector:hover {
  opacity: 1;
  border-color: var(--accent);
  box-shadow: 0 0 8px rgba(217,102,255,0.3);
}

/* ── PET SELECTOR MODAL ── */
#pet-selector-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(5,5,14,0.88);
  backdrop-filter: blur(14px);
  display: flex; align-items: center; justify-content: flex-start;
  opacity: 0; pointer-events: none;
  transition: opacity 0.28s;
}
#pet-selector-overlay.open { opacity: 1; pointer-events: auto; }
#pet-selector-panel {
  position: relative;
  background: #161628;
  border: 1px solid rgba(217,102,255,0.28);
  border-radius: 26px;
  padding: 34px 28px 26px;
  max-width: 580px; width: 92vw;
  box-shadow: 0 0 80px rgba(217,102,255,0.14);
  transform: scale(0.93);
  transition: transform 0.28s cubic-bezier(.34,1.56,.64,1);
}
#pet-selector-overlay.open #pet-selector-panel { transform: scale(1); }
.selector-title {
  font-size: 13px; font-weight: 900;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--accent); text-shadow: 0 0 12px var(--accent);
  text-align: center; margin-bottom: 22px;
}
#pet-selector-panel, #appearance-panel {
  margin-left: max(24px, calc(var(--primary-w) / 2 - 290px));
}
.selector-close {
  position: absolute; top: 14px; right: 18px;
  background: none; border: none;
  color: var(--text-dim); font-size: 20px;
  cursor: pointer; line-height: 1; padding: 4px 6px;
  transition: color 0.2s; font-family: sans-serif;
}
.selector-close:hover { color: #fff; }
#pet-cards-grid {
  display: flex; gap: 12px;
  justify-content: center; flex-wrap: wrap;
}
.pet-card {
  background: #1e1e35;
  border: 2px solid rgba(217,102,255,0.1);
  border-radius: 20px;
  padding: 16px 12px 14px;
  width: 158px;
  display: flex; flex-direction: column; align-items: center; gap: 7px;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
}
.pet-card:hover { transform: translateY(-5px); border-color: rgba(217,102,255,0.38); box-shadow: 0 10px 32px rgba(217,102,255,0.16); }
.pet-card.selected { border-color: var(--accent); box-shadow: 0 0 22px rgba(217,102,255,0.28); }
.pet-card canvas { border-radius: 12px; background: rgba(0,0,0,0.28); display: block; }
.pet-card-name {
  font-size: 12px; font-weight: 900;
  letter-spacing: 0.1em; text-transform: uppercase;
}
.pet-card-tagline {
  font-size: 10px; font-weight: 700;
  color: var(--text-dim); text-align: center; line-height: 1.4;
}
.pet-card-btn {
  font-family: 'Nunito', sans-serif;
  font-size: 9.5px; font-weight: 900;
  letter-spacing: 0.12em; text-transform: uppercase;
  padding: 5px 14px; border-radius: 999px;
  border: 1.5px solid rgba(217,102,255,0.28);
  background: none; color: var(--text-dim);
  cursor: pointer; transition: all 0.15s; margin-top: 2px;
}
.pet-card.selected .pet-card-btn {
  background: var(--accent); border-color: var(--accent); color: #fff;
}
.pet-card-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Mood emoji floating above pet */
#mood-icon {
  font-size: 19px;
  margin-bottom: 4px;
  animation: moodB 2.2s ease-in-out infinite;
  pointer-events: none;
}
@keyframes moodB {
  0%,100%{ transform:translateY(0) }
  50%{ transform:translateY(-5px) }
}

/* ══════════════════════════════
   CHAT — floating messenger bubble
══════════════════════════════ */
#chat-bubble-btn {
  position: fixed;
  bottom: 18px; left: 18px;
  z-index: 35;
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--surface);
  border: 2px solid rgba(217,102,255,0.45);
  box-shadow: 0 4px 22px rgba(217,102,255,0.35);
  font-size: 26px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s, box-shadow 0.2s;
}
#chat-bubble-btn:hover {
  transform: scale(1.1);
  box-shadow: 0 6px 30px rgba(217,102,255,0.55);
}
.chat-unread-dot {
  position: absolute; top: 3px; right: 3px;
  width: 11px; height: 11px;
  border-radius: 50%;
  background: #ff4444;
  border: 2px solid var(--bg);
  display: none;
}
#chat-panel {
  position: fixed;
  bottom: 84px; left: 18px;
  z-index: 34;
  width: 320px;
  max-height: 520px;
  display: flex;
  flex-direction: column;
  background: rgba(13,13,26,0.97);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(217,102,255,0.22);
  border-radius: 22px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.65), 0 0 0 1px rgba(217,102,255,0.06);
  overflow: hidden;
  transform-origin: bottom left;
  opacity: 0; pointer-events: none;
  transform: scale(0.88) translateY(12px);
  transition: opacity 0.22s, transform 0.22s cubic-bezier(.34,1.56,.64,1);
}
#chat-panel.chat-open {
  opacity: 1; pointer-events: auto;
  transform: scale(1) translateY(0);
}
#chat-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 16px 11px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}
#chat-header-info { display: flex; flex-direction: column; gap: 2px; }
#chat-header-name { font-size: 13px; font-weight: 900; color: var(--text); }
#chat-header-status { font-size: 10px; font-weight: 700; color: var(--text-dim); letter-spacing: 0.06em; }
#chat-close-btn {
  background: none; border: none;
  color: var(--text-dim); font-size: 18px;
  cursor: pointer; padding: 4px 6px; line-height: 1;
  transition: color 0.15s; font-family: sans-serif;
}
#chat-close-btn:hover { color: var(--text); }

/* Quick pills */
#pill-row {
  display: flex;
  gap: 6px;
  padding: 8px 12px;
  overflow-x: auto;
  flex-shrink: 0;
  flex-wrap: nowrap;
  scrollbar-width: none;
}
#pill-row::-webkit-scrollbar { display: none; }
.pill {
  font-family: 'Nunito', sans-serif;
  font-size: 11px; font-weight: 800;
  padding: 5px 11px;
  white-space: nowrap;
  border-radius: 999px;
  background: var(--surface2);
  border: 1.5px solid rgba(217,102,255,0.18);
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.16s;
  outline: none;
}
.pill:hover {
  background: rgba(217,102,255,0.18);
  border-color: var(--accent);
  color: #fff;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(217,102,255,0.22);
}
.pill:active { transform:scale(0.95); }

/* Chat history */
#chat-history-wrap {
  flex: 1;
  min-height: 80px;
  max-height: 260px;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}
#chat-history {
  width: 100%;
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
  scrollbar-width: thin;
  scrollbar-color: rgba(217,102,255,0.3) transparent;
  padding: 8px 12px;
  cursor: grab;
  user-select: none;
}
#chat-history.dragging { cursor: grabbing; }
#chat-history::-webkit-scrollbar { width:4px; }
#chat-history::-webkit-scrollbar-thumb { background:rgba(217,102,255,0.3); border-radius:4px; }
#chat-history::-webkit-scrollbar-track { background:transparent; }
#chat-scroll-up, #chat-scroll-down {
  flex-shrink: 0;
  width: 100%; height: 22px;
  background: none;
  border: none;
  color: rgba(217,102,255,0.4);
  font-size: 10px;
  cursor: pointer;
  transition: color 0.15s;
  line-height: 1;
}
#chat-scroll-up:hover, #chat-scroll-down:hover { color: rgba(217,102,255,0.9); }

.msg-row {
  display: flex; gap: 7px;
  animation: msgSlide 0.26s cubic-bezier(.34,1.56,.64,1);
}
@keyframes msgSlide {
  from{ opacity:0; transform:translateY(8px) }
  to{ opacity:1; transform:translateY(0) }
}
.msg-row.user { justify-content: flex-end; }
.msg-row.pet  { justify-content: flex-start; }

.msg-avatar {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items:center; justify-content:center;
  font-size: 13px; flex-shrink:0; align-self:flex-end;
}
.msg-bubble {
  padding: 8px 13px;
  border-radius: 16px;
  font-size: 12.5px; font-weight: 700;
  line-height: 1.5;
  max-width: 78%;
  word-break: break-word;
}
.msg-row.user .msg-bubble {
  background: linear-gradient(135deg, var(--accent), #9b20d0);
  color: #fff;
  border-bottom-right-radius: 3px;
}
.msg-row.pet .msg-bubble {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid rgba(217,102,255,0.2);
  border-bottom-left-radius: 3px;
}

/* Input row */
#input-row {
  display: flex; gap: 9px;
  width: 100%; align-items: center;
  padding: 10px 12px;
  border-top: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}
#chat-input {
  flex: 1;
  background: var(--surface2);
  border: 2px solid rgba(217,102,255,0.3);
  border-radius: 999px;
  padding: 10px 18px;
  font-family: 'Nunito', sans-serif;
  font-size: 13px; font-weight: 700;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
#chat-input::placeholder { color: var(--text-dim); }
#chat-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(217,102,255,0.13);
}
#send-btn {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #8800cc);
  border: none; cursor: pointer;
  font-size: 17px; color: #fff;
  display: flex; align-items:center; justify-content:center;
  flex-shrink: 0;
  transition: transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 4px 16px rgba(217,102,255,0.38);
}
#send-btn:hover { transform:scale(1.1); box-shadow:0 6px 20px rgba(217,102,255,0.6); }
#send-btn:active { transform:scale(0.93); }
#send-btn:disabled { opacity:0.4; cursor:default; transform:none; }

/* ── SPARKLES ── */
.sparkle {
  position: fixed; pointer-events:none; z-index:999;
  font-size: 17px;
  animation: sparkleP 0.85s ease-out forwards;
}
@keyframes sparkleP {
  0%  { opacity:1; transform:translate(0,0) scale(1.2); }
  100%{ opacity:0; transform:translate(var(--tx),var(--ty)) scale(0.2); }
}

/* ── HARDWARE PANEL ── */
#hw-panel {
  position: fixed;
  top: 120px;
  left: calc(var(--primary-w) - 212px);
  z-index: 5;
  width: 188px;
  background: rgba(13,13,26,0.78);
  border: 1px solid rgba(217,102,255,0.18);
  border-radius: 14px;
  padding: 10px 13px 11px;
  backdrop-filter: blur(10px);
  pointer-events: none;
  opacity: 0;
  transform: translateY(-6px);
  transition: opacity 0.4s, transform 0.4s;
}
#hw-panel.visible { opacity: 1; transform: translateY(0); }
.hw-title {
  font-size: 9px; font-weight: 900;
  letter-spacing: 0.18em;
  color: rgba(238,238,255,0.35);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.hw-row { display:flex; align-items:center; gap:6px; margin-bottom:5px; }
.hw-row:last-child { margin-bottom:0; }
.hw-label {
  font-size: 9px; font-weight: 900;
  letter-spacing: 0.1em;
  color: rgba(238,238,255,0.45);
  text-transform: uppercase;
  width: 30px; flex-shrink:0;
}
.hw-bar {
  flex:1; height:5px;
  background: rgba(255,255,255,0.07);
  border-radius: 999px; overflow:hidden;
}
.hw-fill {
  height:100%; width:0%;
  border-radius:999px;
  background: var(--accent);
  transition: width 0.9s cubic-bezier(.4,0,.2,1), background 0.5s;
}
.hw-val {
  font-size: 9.5px; font-weight:800;
  color: rgba(238,238,255,0.55);
  width: 52px; text-align:right; flex-shrink:0;
}

/* ── MODE INDICATOR ── */
#mode-indicator {
  position: fixed;
  top: 36px;
  left: calc(var(--primary-w) - 24px);
  transform: translateX(-100%);
  z-index: 5;
  display: flex;
  align-items: center;
  gap: 6px;
  pointer-events: none;
  background: rgba(13,13,26,0.72);
  border: 1px solid rgba(217,102,255,0.18);
  border-radius: 999px;
  padding: 5px 12px 5px 8px;
  backdrop-filter: blur(8px);
}
.mode-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #ffcc44;
  box-shadow: 0 0 7px #ffcc44;
  flex-shrink: 0;
  transition: background 0.4s, box-shadow 0.4s;
}
.mode-label {
  font-size: 10px; font-weight: 800;
  letter-spacing: 0.1em;
  color: rgba(238,238,255,0.55);
  text-transform: uppercase;
}

/* ── SETTINGS BUTTON + PANEL ── */
#settings-btn {
  position: fixed;
  top: 80px;
  left: calc(var(--primary-w) - 54px);
  z-index: 31;
  width: 30px; height: 30px;
  border-radius: 50%;
  background: rgba(10,10,30,0.72);
  border: 1px solid rgba(217,102,255,0.28);
  color: rgba(238,238,255,0.55);
  font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: color 0.2s, border-color 0.2s, box-shadow 0.2s;
}
#settings-btn:hover {
  color: var(--accent); border-color: var(--accent);
  box-shadow: 0 0 10px rgba(217,102,255,0.3);
}
#settings-panel {
  position: fixed;
  top: 118px;
  left: calc(var(--primary-w) - 18px);
  transform: translateX(-100%) translateY(8px) scale(0.96);
  bottom: auto;
  z-index: 31;
  background: rgba(13,13,26,0.96);
  border: 1px solid rgba(217,102,255,0.24);
  border-radius: 16px;
  padding: 14px 18px;
  backdrop-filter: blur(14px);
  min-width: 180px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
#settings-panel.open {
  opacity: 1; pointer-events: auto;
  transform: translateX(-100%) translateY(0) scale(1);
}
.settings-title {
  font-size: 9px; font-weight: 900;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
}
.settings-row {
  display: flex; align-items: center;
  justify-content: space-between;
  gap: 14px; margin-bottom: 10px;
}
.settings-row:last-child { margin-bottom: 0; }
.settings-label {
  font-size: 11px; font-weight: 800;
  color: rgba(238,238,255,0.7);
}
.tog {
  position: relative; width: 34px; height: 19px;
  cursor: pointer; flex-shrink: 0;
}
.tog input { opacity: 0; width: 0; height: 0; }
.tog-track {
  position: absolute; inset: 0;
  background: rgba(255,255,255,0.12);
  border-radius: 999px;
  transition: background 0.2s;
}
.tog input:checked ~ .tog-track { background: var(--accent); }
.tog-thumb {
  position: absolute;
  top: 3px; left: 3px;
  width: 13px; height: 13px;
  border-radius: 50%;
  background: #fff;
  transition: transform 0.2s;
  pointer-events: none;
}

<script>
// ══════════════════════════════════════════════════
//  BACKGROUND
// ══════════════════════════════════════════════════
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx = bgCanvas.getContext('2d');
function resizeBg(){ bgCanvas.width=window.innerWidth; bgCanvas.height=window.innerHeight; }
resizeBg(); window.addEventListener('resize', resizeBg);

const STARS = Array.from({length:180}, ()=>({
  x:Math.random(), y:Math.random(),
  r:Math.random()*1.6+0.2,
  ph:Math.random()*Math.PI*2,
  spd:Math.random()*0.6+0.2,
  col:['#ffffff','#d966ff','#00e5ff','#69ff47','#ffcc44'][0|Math.random()*5]
}));
const NEBULAS = Array.from({length:5}, ()=>({
  x:Math.random(), y:Math.random(),
  r:170+Math.random()*220,
  col:['rgba(217,102,255,','rgba(0,229,255,','rgba(105,255,71,'][0|Math.random()*3],
  ph:Math.random()*Math.PI*2, spd:0.0003+Math.random()*0.0004
}));
const shootingStars=[];
function spawnShootingStar(){
  shootingStars.push({x:Math.random()*bgCanvas.width*.7,y:Math.random()*bgCanvas.height*.4,
    len:80+Math.random()*120,life:1,spd:0.04});
}
function drawBgSpace(t){
  const W=bgCanvas.width,H=bgCanvas.height;
  const grad=bgCtx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,bgGradTop); grad.addColorStop(1,bgGradBot);
  bgCtx.fillStyle=grad; bgCtx.fillRect(0,0,W,H);
  for(const n of NEBULAS){
    const a=0.022+Math.sin(t*n.spd+n.ph)*0.012;
    const g=bgCtx.createRadialGradient(n.x*W,n.y*H,0,n.x*W,n.y*H,n.r);
    g.addColorStop(0,n.col+a+')'); g.addColorStop(1,n.col+'0)');
    bgCtx.beginPath(); bgCtx.arc(n.x*W,n.y*H,n.r,0,Math.PI*2);
    bgCtx.fillStyle=g; bgCtx.fill();
  }
  for(const s of STARS){
    const a=Math.max(0,0.15+Math.sin(t*s.spd+s.ph)*0.28);
    bgCtx.beginPath(); bgCtx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
    bgCtx.fillStyle=s.col; bgCtx.globalAlpha=a; bgCtx.fill();
  }
  bgCtx.globalAlpha=1;
  if(Math.random()<0.0018) spawnShootingStar();
  for(let i=shootingStars.length-1;i>=0;i--){
    const s=shootingStars[i];
    bgCtx.save(); bgCtx.globalAlpha=s.life*0.75;
    const g=bgCtx.createLinearGradient(s.x,s.y,s.x+s.len,s.y+s.len*0.4);
    g.addColorStop(0,'rgba(255,255,255,0)'); g.addColorStop(1,'rgba(255,255,255,0.9)');
    bgCtx.strokeStyle=g; bgCtx.lineWidth=1.5;
    bgCtx.beginPath(); bgCtx.moveTo(s.x,s.y);
    bgCtx.lineTo(s.x+s.len*(1-s.life),s.y+s.len*0.4*(1-s.life)); bgCtx.stroke();
    bgCtx.restore();
    s.life-=s.spd; s.x+=3; s.y+=1.2;
    if(s.life<=0) shootingStars.splice(i,1);
  }
}

// ══════════════════════════════════════════════════
//  DISPLAY WIDTH (span / multi-monitor support)
// ══════════════════════════════════════════════════
// Auto-detect single-monitor width even in span mode.
// In span, screen.height stays at one monitor's height, so height * (16/9) = single monitor width.
// If the saved value equals the full innerWidth in a wide layout, it was auto-set wrong — reset it.
function detectDisplayWidth() {
  const saved = parseInt(localStorage.getItem('displayW'));
  const heuristic = Math.min(window.innerWidth, Math.round(window.screen.height * 16 / 9));
  if (saved && saved < window.innerWidth) return saved;
  return heuristic || 1920;
}
function detectDisplayHeight() {
  const saved = parseInt(localStorage.getItem('displayH'));
  if (saved) return saved;
  return Math.min(window.innerHeight, window.screen.height) || 1080;
}
let displayW = detectDisplayWidth();
let displayH = detectDisplayHeight();

function setDisplayWidth(w) {
  displayW = Math.max(800, Math.min(7680, w || displayW));
  localStorage.setItem('displayW', displayW);
  document.documentElement.style.setProperty('--primary-w', displayW + 'px');
  const inp = document.getElementById('display-w-input');
  if (inp) inp.value = displayW;
}
function setDisplayHeight(h) {
  displayH = Math.max(400, Math.min(4320, h || displayH));
  localStorage.setItem('displayH', displayH);
  document.documentElement.style.setProperty('--primary-h', displayH + 'px');
  const inp = document.getElementById('display-h-input');
  if (inp) inp.value = displayH;
}
function resetDisplaySize() {
  localStorage.removeItem('displayW');
  localStorage.removeItem('displayH');
  setDisplayWidth(detectDisplayWidth());
  setDisplayHeight(detectDisplayHeight());
}

// Keyboard shortcut: Ctrl+, opens settings even when button is off-screen
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === ',') { e.preventDefault(); toggleSettings(); }
  if (e.key === 'Escape') {
    if (appearanceOpen) closeAppearance();
    else if (selectorOpen) closePetSelector();
    else if (settingsPanelOpen) { settingsPanelOpen = false; document.getElementById('settings-panel').classList.remove('open'); }
  }
});

let currentBgScene = 'space';

function drawBg(t) {
  switch(currentBgScene) {
    case 'ocean':  drawBgOcean(t);  break;
    case 'forest': drawBgForest(t); break;
    case 'office': drawBgOffice(t); break;
    default:       drawBgSpace(t);  break;
  }
}

function drawBgOcean(t) {
  const W=bgCanvas.width,H=bgCanvas.height;
  // Sky
  const sky=bgCtx.createLinearGradient(0,0,0,H*0.6);
  sky.addColorStop(0,'#010a1a'); sky.addColorStop(0.5,'#051830'); sky.addColorStop(1,'#0a2848');
  bgCtx.fillStyle=sky; bgCtx.fillRect(0,0,W,H*0.7);
  // Stars
  bgCtx.save(); bgCtx.beginPath(); bgCtx.rect(0,0,W,H*0.52); bgCtx.clip();
  for(const s of STARS){
    const a=Math.max(0,0.1+Math.sin(t*s.spd+s.ph)*0.2);
    bgCtx.beginPath(); bgCtx.arc(s.x*W,s.y*H*0.52,s.r*0.7,0,Math.PI*2);
    bgCtx.fillStyle='#ffffff'; bgCtx.globalAlpha=a; bgCtx.fill();
  }
  bgCtx.globalAlpha=1; bgCtx.restore();
  // Moon
  const mX=W*0.74,mY=H*0.14;
  const mg=bgCtx.createRadialGradient(mX,mY,0,mX,mY,65);
  mg.addColorStop(0,'rgba(200,220,255,0.18)'); mg.addColorStop(1,'transparent');
  bgCtx.beginPath(); bgCtx.arc(mX,mY,65,0,Math.PI*2); bgCtx.fillStyle=mg; bgCtx.fill();
  bgCtx.beginPath(); bgCtx.arc(mX,mY,19,0,Math.PI*2); bgCtx.fillStyle='#d4e8f5'; bgCtx.fill();
  // Water
  const wY=H*0.58;
  const wat=bgCtx.createLinearGradient(0,wY,0,H*0.82);
  wat.addColorStop(0,'#041520'); wat.addColorStop(1,'#061c30');
  bgCtx.fillStyle=wat; bgCtx.fillRect(0,wY,W,H*0.25);
  // Moon reflection
  bgCtx.save(); bgCtx.beginPath(); bgCtx.rect(0,wY,W,H*0.25); bgCtx.clip();
  const refl=bgCtx.createLinearGradient(mX-25,wY,mX+25,wY);
  refl.addColorStop(0,'transparent'); refl.addColorStop(0.5,'rgba(200,225,255,0.1)'); refl.addColorStop(1,'transparent');
  bgCtx.fillStyle=refl; bgCtx.fillRect(mX-50,wY,100,H*0.25); bgCtx.restore();
  // Waves
  for(let l=0;l<4;l++){
    const yb=wY+l*20+8, amp=3+l*1.5, spd=0.0008+l*0.0003;
    bgCtx.beginPath(); bgCtx.moveTo(0,yb);
    for(let x=0;x<=W;x+=4){ bgCtx.lineTo(x,yb+Math.sin(x*0.018+t*spd*1000)*amp); }
    bgCtx.strokeStyle=`rgba(100,180,220,${0.12-l*0.025})`; bgCtx.lineWidth=1.5; bgCtx.stroke();
  }
  // Sand
  const sandY=H*0.82;
  const sand=bgCtx.createLinearGradient(0,sandY,0,H);
  sand.addColorStop(0,'#7a6445'); sand.addColorStop(0.3,'#967a58'); sand.addColorStop(1,'#b8976e');
  bgCtx.fillStyle=sand; bgCtx.fillRect(0,sandY,W,H-sandY);
  // Wet sand shimmer
  const sAlpha=0.18+Math.sin(t*0.0009)*0.06;
  const shim=bgCtx.createLinearGradient(0,sandY-2,0,sandY+14);
  shim.addColorStop(0,`rgba(80,140,190,${sAlpha})`); shim.addColorStop(1,'transparent');
  bgCtx.fillStyle=shim; bgCtx.fillRect(0,sandY-2,W,16);
  // Horizon glow
  const hg=bgCtx.createLinearGradient(0,wY-20,0,wY+30);
  hg.addColorStop(0,'transparent'); hg.addColorStop(0.5,'rgba(60,130,200,0.08)'); hg.addColorStop(1,'transparent');
  bgCtx.fillStyle=hg; bgCtx.fillRect(0,wY-20,W,50);
}

function drawBgForest(t) {
  const W=bgCanvas.width,H=bgCanvas.height;
  // Sky
  const sky=bgCtx.createLinearGradient(0,0,0,H*0.5);
  sky.addColorStop(0,'#010804'); sky.addColorStop(1,'#031208');
  bgCtx.fillStyle=sky; bgCtx.fillRect(0,0,W,H);
  // Stars through canopy
  bgCtx.save(); bgCtx.beginPath(); bgCtx.rect(0,0,W,H*0.38); bgCtx.clip();
  for(const s of STARS){
    const a=Math.max(0,0.08+Math.sin(t*s.spd+s.ph)*0.18);
    bgCtx.beginPath(); bgCtx.arc(s.x*W,s.y*H*0.38,s.r*0.6,0,Math.PI*2);
    bgCtx.fillStyle='#ccffcc'; bgCtx.globalAlpha=a*0.65; bgCtx.fill();
  }
  bgCtx.globalAlpha=1; bgCtx.restore();
  // Pine tree helper
  function pine(x,y,h,col){
    const w=h*0.48;
    for(let i=0;i<3;i++){
      const ty=y-h*0.28*i-h*0.18, tw=w*(1-i*0.18)*(1+i*0.08);
      bgCtx.beginPath(); bgCtx.moveTo(x,ty-h*0.32); bgCtx.lineTo(x-tw/2,ty); bgCtx.lineTo(x+tw/2,ty); bgCtx.closePath();
      bgCtx.fillStyle=col; bgCtx.fill();
    }
    bgCtx.fillStyle='#0e0804'; bgCtx.fillRect(x-3,y-h*0.12,6,h*0.16);
  }
  // Far trees
  for(let i=0;i<22;i++){
    pine((i/22)*W*1.1-W*0.05, H*0.54, 55+(i*37%38), '#061506');
  }
  // Mid trees
  for(let i=0;i<15;i++){
    pine((i/15)*W*1.1-W*0.04, H*0.67, 90+(i*53%55), '#040e04');
  }
  // Ground
  const gnd=bgCtx.createLinearGradient(0,H*0.64,0,H);
  gnd.addColorStop(0,'#020c02'); gnd.addColorStop(1,'#010601');
  bgCtx.fillStyle=gnd; bgCtx.fillRect(0,H*0.64,W,H);
  // Near trees
  for(let i=0;i<10;i++){
    pine((i/10)*W*1.1-W*0.05, H*0.88, 150+(i*71%75), '#020802');
  }
  // Fireflies
  for(let i=0;i<20;i++){
    const ph=i*2.399;
    const fx=(0.08+((Math.sin(t*0.00025+ph)*0.5+0.5)*0.84))*W;
    const fy=H*0.42+(Math.cos(t*0.00035+ph*1.3)*0.5+0.5)*H*0.38;
    const fa=Math.max(0,Math.sin(t*0.0022+ph)*0.65+0.35);
    if(fa>0.12){
      const fg=bgCtx.createRadialGradient(fx,fy,0,fx,fy,9);
      fg.addColorStop(0,`rgba(190,255,80,${fa*0.85})`); fg.addColorStop(1,'transparent');
      bgCtx.beginPath(); bgCtx.arc(fx,fy,9,0,Math.PI*2); bgCtx.fillStyle=fg; bgCtx.fill();
      bgCtx.beginPath(); bgCtx.arc(fx,fy,1.8,0,Math.PI*2); bgCtx.fillStyle=`rgba(210,255,130,${fa})`; bgCtx.fill();
    }
  }
  // Ground fog
  for(let i=0;i<5;i++){
    const fx=(Math.sin(t*0.00018+i*1.5)*0.3+0.15+i*0.17)*W;
    const fy=H*0.69+i*12;
    const fg=bgCtx.createRadialGradient(fx,fy,0,fx,fy,100+i*18);
    fg.addColorStop(0,'rgba(160,255,160,0.035)'); fg.addColorStop(1,'transparent');
    bgCtx.beginPath(); bgCtx.ellipse(fx,fy,130+i*28,18,0,0,Math.PI*2); bgCtx.fillStyle=fg; bgCtx.fill();
  }
}

function drawBgOffice(t) {
  const W=bgCanvas.width,H=bgCanvas.height;
  // Room walls
  bgCtx.fillStyle='#0e0c0a'; bgCtx.fillRect(0,0,W,H);
  // Subtle wall grid
  bgCtx.strokeStyle='rgba(255,255,255,0.014)'; bgCtx.lineWidth=1;
  for(let x=0;x<=W;x+=44){ bgCtx.beginPath(); bgCtx.moveTo(x,0); bgCtx.lineTo(x,H*0.74); bgCtx.stroke(); }
  for(let y=0;y<=H*0.74;y+=44){ bgCtx.beginPath(); bgCtx.moveTo(0,y); bgCtx.lineTo(W,y); bgCtx.stroke(); }
  // Window
  const wX=W*0.15,wY=H*0.09,wW=W*0.28,wH=H*0.44;
  bgCtx.fillStyle='#04070e'; bgCtx.fillRect(wX,wY,wW,wH);
  bgCtx.save(); bgCtx.beginPath(); bgCtx.rect(wX,wY,wW,wH); bgCtx.clip();
  // City building silhouettes
  const buildings=[[0.05,0.55,0.12,0.45],[0.18,0.4,0.1,0.6],[0.3,0.6,0.13,0.4],[0.44,0.45,0.1,0.55],[0.56,0.65,0.11,0.35],[0.68,0.48,0.09,0.52],[0.8,0.58,0.14,0.42]];
  buildings.forEach(([bx,top,bw,bh])=>{
    bgCtx.fillStyle='#0a0e18';
    bgCtx.fillRect(wX+bx*wW, wY+top*wH, bw*wW, bh*wH);
    // windows on buildings
    for(let wy2=0;wy2<5;wy2++) for(let wx2=0;wx2<3;wx2++){
      if(Math.sin(bx*97+wy2*13+wx2*7)>0.1){
        const fa=0.4+Math.sin(t*0.0008+bx*20+wy2*7)*0.3;
        const wc=['#ffdd88','#aaccff','#ffaa44','#88ddff'][((bx*17+wy2*5)&3)];
        bgCtx.fillStyle=wc; bgCtx.globalAlpha=fa;
        bgCtx.fillRect(wX+bx*wW+wx2*bw*wW*0.28+bw*wW*0.12, wY+top*wH+wy2*bh*wH*0.18+bh*wH*0.06, bw*wW*0.14, bh*wH*0.1);
      }
    }
    bgCtx.globalAlpha=1;
  });
  // Rain
  for(let i=0;i<22;i++){
    const rx=wX+(i*137.508%1)*wW;
    const ry=wY+((t*0.065+i*29)%(wH*1.3))-wH*0.15;
    const rl=5+(i%5)*3;
    bgCtx.beginPath(); bgCtx.moveTo(rx,ry); bgCtx.lineTo(rx-1,ry+rl);
    bgCtx.strokeStyle='rgba(140,190,255,0.32)'; bgCtx.lineWidth=1; bgCtx.stroke();
  }
  bgCtx.restore();
  // Window glow spill
  const wglow=bgCtx.createRadialGradient(wX+wW/2,wY+wH/2,0,wX+wW/2,wY+wH/2,wW*0.95);
  wglow.addColorStop(0,'rgba(80,120,200,0.05)'); wglow.addColorStop(1,'transparent');
  bgCtx.beginPath(); bgCtx.ellipse(wX+wW/2,wY+wH/2,wW,wH*0.75,0,0,Math.PI*2); bgCtx.fillStyle=wglow; bgCtx.fill();
  // Window frame
  bgCtx.strokeStyle='#2a2218'; bgCtx.lineWidth=6; bgCtx.strokeRect(wX,wY,wW,wH);
  bgCtx.beginPath(); bgCtx.moveTo(wX+wW/2,wY); bgCtx.lineTo(wX+wW/2,wY+wH); bgCtx.moveTo(wX,wY+wH/2); bgCtx.lineTo(wX+wW,wY+wH/2); bgCtx.stroke();
  // Desk lamp
  const lX=W*0.82,lY=H*0.4;
  const lg=bgCtx.createRadialGradient(lX,lY+40,0,lX,lY+40,130);
  lg.addColorStop(0,`rgba(255,215,90,${0.2+Math.sin(t*0.0009)*0.02})`);
  lg.addColorStop(0.5,'rgba(255,170,40,0.06)'); lg.addColorStop(1,'transparent');
  bgCtx.beginPath(); bgCtx.ellipse(lX,lY+70,145,90,0,0,Math.PI*2); bgCtx.fillStyle=lg; bgCtx.fill();
  bgCtx.fillStyle='#2a2014';
  bgCtx.beginPath(); bgCtx.ellipse(lX,lY,23,13,-0.3,0,Math.PI*2); bgCtx.fill();
  bgCtx.fillStyle='#ffe07a';
  bgCtx.beginPath(); bgCtx.ellipse(lX+2,lY-2,10,6,-0.3,0,Math.PI*2); bgCtx.fill();
  bgCtx.strokeStyle='#1e1810'; bgCtx.lineWidth=3;
  bgCtx.beginPath(); bgCtx.moveTo(lX-4,lY+8); bgCtx.lineTo(lX-8,lY+56); bgCtx.stroke();
  // Bookshelf
  bgCtx.fillStyle='#181410'; bgCtx.fillRect(W*0.88,H*0.04,W*0.1,H*0.56);
  const bkCols=['#7a3030','#305a7a','#30784a','#786030','#5a2e78','#784830'];
  let bx2=W*0.893;
  for(let i=0;i<9;i++){
    const bw2=11+(i%3)*5,bh2=55+(i%4)*18,by2=H*0.06+(75-bh2)/2;
    bgCtx.fillStyle=bkCols[i%bkCols.length]; bgCtx.globalAlpha=0.72;
    bgCtx.fillRect(bx2,by2,bw2-1,bh2); bx2+=bw2;
    if(bx2>W*0.975) break;
  }
  bgCtx.globalAlpha=1;
  // Desk
  const dY=H*0.72;
  const desk=bgCtx.createLinearGradient(0,dY,0,H*0.78);
  desk.addColorStop(0,'#281e12'); desk.addColorStop(1,'#1c1408');
  bgCtx.fillStyle=desk; bgCtx.fillRect(0,dY,W,H*0.08);
  bgCtx.fillStyle='rgba(255,190,100,0.07)'; bgCtx.fillRect(0,dY,W,2);
  // Monitor glow on desk
  const mng=bgCtx.createRadialGradient(W*0.35,dY-20,0,W*0.35,dY-90,115);
  mng.addColorStop(0,'rgba(90,140,255,0.1)'); mng.addColorStop(1,'transparent');
  bgCtx.beginPath(); bgCtx.ellipse(W*0.35,dY-10,125,80,0,0,Math.PI*2); bgCtx.fillStyle=mng; bgCtx.fill();
  // Floor
  const flr=bgCtx.createLinearGradient(0,H*0.78,0,H);
  flr.addColorStop(0,'#0c0a08'); flr.addColorStop(1,'#06040302');
  bgCtx.fillStyle=flr; bgCtx.fillRect(0,H*0.78,W,H);
}

let selectorOpen = false;

function openPetSelector() {
  selectorOpen = true;
  document.getElementById('pet-selector-overlay').classList.add('open');
  const grid = document.getElementById('pet-cards-grid');
  grid.innerHTML = '';
  (window.PET_REGISTRY||[]).forEach(pet => {
    const card = document.createElement('div');
    card.className = 'pet-card' + (pet.id===currentPetType?' selected':'');

    const cnv = document.createElement('canvas');
    cnv.width = 120; cnv.height = 120;
    pet._previewCtx = cnv.getContext('2d');

    const nameEl = document.createElement('div');
    nameEl.className = 'pet-card-name';
    nameEl.textContent = pet.name;
    nameEl.style.color = pet.accentColor;
    nameEl.style.textShadow = `0 0 10px ${pet.accentColor}`;

    const tagEl = document.createElement('div');
    tagEl.className = 'pet-card-tagline';
    tagEl.textContent = pet.tagline;

    const btn = document.createElement('button');
    btn.className = 'pet-card-btn';
    btn.textContent = pet.id===currentPetType ? '✓ Selected' : 'Select';
    btn.onclick = e => { e.stopPropagation(); selectPetFromCard(pet.id); };

    card.appendChild(cnv);
    card.appendChild(nameEl);
    card.appendChild(tagEl);
    card.appendChild(btn);
    card.onclick = () => selectPetFromCard(pet.id);
    grid.appendChild(card);
  });
}

function closePetSelector() {
  selectorOpen = false;
  (window.PET_REGISTRY||[]).forEach(p => p._previewCtx = null);
  document.getElementById('pet-selector-overlay').classList.remove('open');
}

function selectPetFromCard(petId) {
  switchPet(petId);
  closePetSelector();
}

function spawnSparkles(cx,cy){
  const pool=['✨','💜','⭐','💫','🌟','🎵','💥','🐾'];
  for(let i=0;i<7;i++){
    const el=document.createElement('div'); el.className='sparkle';
    el.textContent=pool[i%pool.length];
    el.style.left=cx+'px'; el.style.top=cy+'px';
    const a=(i/7)*Math.PI*2+Math.random()*.5, d=38+Math.random()*50;
    el.style.setProperty('--tx',Math.cos(a)*d+'px');
    el.style.setProperty('--ty',(Math.sin(a)*d-22)+'px');
    document.body.appendChild(el); setTimeout(()=>el.remove(),900);
  }
}

function getResponse(input){
  const q=input.toLowerCase().trim();
  // Time/date
  if(/\b(time|clock|hour)\b/.test(q)){
    const n=new Date(),h=String(n.getHours()).padStart(2,'0'),m=String(n.getMinutes()).padStart(2,'0');
    return{text:`It's ${h}:${m} right now! ⏰ Check the top-left clock too~`,mood:'happy'};
  }
  if(/\b(date|day|today|month|year)\b/.test(q)){
    const n=new Date();
    const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
    return{text:`Today is ${days[n.getDay()]}, ${months[n.getMonth()]} ${n.getDate()}, ${n.getFullYear()}! 📅`,mood:'happy'};
  }
  // Greetings
  if(/\b(hi|hello|hey|howdy|sup|yo|hiya|greetings)\b/.test(q)){
    const hr=new Date().getHours();
    const g=getActivePet()?.greetings||{};
    const pool=hr<12?g.am:hr<17?g.pm:hr<21?g.eve:g.night;
    return{text:pick(pool||['Hey! 👋✨']),mood:'excited'};
  }
  if(/good morning/.test(q)) return{text:pick(getActivePet()?.greetings?.am||['Good morning! ☀️']),mood:'excited'};
  if(/good (afternoon|day)/.test(q)) return{text:pick(getActivePet()?.greetings?.pm||['Good afternoon! 🌤️']),mood:'happy'};
  if(/good (evening|night)|goodnight/.test(q)) return{text:pick(getActivePet()?.greetings?.eve||['Good evening! 🌙']),mood:'sleepy'};
  // How are you
  if(/how are you|how('s| is) pixel|you okay/.test(q))
    return{text:pick(["I'm doing AMAZING! *spins around* ✨ How about you? 💜","Feeling great and fluffy! 🐾 How are YOU?","Wonderful! Especially now that you're here! 💖"]),mood:'excited'};
  // Feelings
  if(/i('m| am) (good|great|amazing|happy|wonderful|fantastic|awesome)/.test(q))
    return{text:pick(["*bounces* Yay! That makes Pixel SO happy! 🎉💜","Wonderful! You deserve all good things! 🌟","I'm SO glad! *happy tail wag* Keep riding that wave! 🌊✨"]),mood:'excited'};
  if(/i('m| am) (sad|bad|tired|stressed|upset|not (ok|okay|good)|lonely)/.test(q))
    return{text:pick(["*curls up next to you* I'm sorry. You're not alone 💜","*nuzzles gently* That sounds tough. I'm here for you! 🐾","Sending you the biggest virtual hug right now! 🤗 It'll get better!"]),mood:'sad'};

    return{text:pick(["*blushes furiously* I love you too!! 💜💜💜","AWW! *tail wag intensifies* You just made Pixel SO happy! 🥰","*covers face with paws* That's the sweetest thing!! 💕"]),mood:'love'};
  // Facts
  if(/\b(fact|facts|interesting|learn|teach me|tell me something|did you know)\b/.test(q))
    return{text:pick(FACTS),mood:'thinking'};
  // Jokes
  if(/\b(joke|jokes|funny|laugh|humor|make me laugh)\b/.test(q)){
    const j=pick(JOKES); return{text:`${j[0]}\n\n👉 ${j[1]}`,mood:'excited'};
  }
  // Riddles
  if(/\b(riddle|puzzle|brain teaser|guess)\b/.test(q)){
    const r=pick(RIDDLES); return{text:`🤔 "${r[0]}"\n\nAnswer: ${r[1]}`,mood:'thinking'};
  }
  // Motivation
  if(/\b(motivat|inspire|encourage|cheer me up|keep going|i can('t| not))\b/.test(q))
    return{text:pick(MOTIVATIONS),mood:'excited'};
  // Bored
  if(/\b(bored|nothing to do|what (should|can) i do|entertain me|fun (ideas?|things?))\b/.test(q))
    return{text:pick(BORED),mood:'thinking'};
  // Compliments
  if(/\b(compliment|say something nice|flatter me|nice (thing|words?))\b/.test(q))
    return{text:pick(COMPLIMENTS),mood:'love'};
  // About
  if(/\b(who are you|what are you|your name|about you)\b/.test(q))
    return{text:getActivePet()?.aboutText||"I'm your desktop companion! ✨",mood:'happy'};
  if(/\b(what can you do|help|commands|how (do|does) (this|pixel) work)\b/.test(q))
    return{text:"Ask me for: fun facts 🧠, jokes 😂, riddles 🤔, motivation 💪, compliments 💖, bored ideas 😴, time/date 🕐, or just say hi! I'm always here! ✨",mood:'thinking'};
  // Thanks
  if(/\b(thank(s| you)|thx|ty|appreciate)\b/.test(q))
    return{text:pick(["*wiggles excitedly* You're SO welcome!! 💜🐾","Aww anytime! That's what I'm here for! ✨","*nuzzles* Of course! Always! 💕"]),mood:'love'};
  // Weather
  if(/\b(weather|rain|sunny|temperature|forecast)\b/.test(q))
    return{text:"I can't peek outside from your wallpaper 😅 Check your weather app for that! 🌤️ But I hope it's beautiful out there!",mood:'thinking'};
  // Bye
  if(/\b(bye|goodbye|see you|later|gtg|gotta go)\b/.test(q))
    return{text:pick(["Bye bye! *waves paw* Come back soon! 💜🐾","See you! *tiny wave* I'll miss you~ 🥺✨","Take care!! I'll be right here on your wallpaper! 🌟"]),mood:'sad'};
  // Math
  const mm=q.match(/(\d+\.?\d*)\s*([+\-*/x×÷])\s*(\d+\.?\d*)/);
  if(mm){
    const a=parseFloat(mm[1]),op=mm[2],b2=parseFloat(mm[3]);
    let r=op==='+'?a+b2:op==='-'?a-b2:(op==='*'||op==='x'||op==='×')?a*b2:b2!==0?a/b2:'undefined';
    return{text:`${a} ${op} ${b2} = ${r} 🧮 *beep boop, math mode activated!*`,mood:'thinking'};
  }
  // Default
  return{text:pick([
    "Hmm! *tilts head* That's a tricky one! Try: joke, fact, riddle, or compliment! 🐾",
    "*scrunches face* I'm not sure! But I know LOTS of jokes and facts! 🧠",
    "Ooh! *ears perk up* I don't quite know that — but ask me for a fact or joke! ✨",
    "I'm just a fluffy wallpaper pet so my knowledge has limits! 😅 Try: motivate, bored, or compliment! 💜",
  ]),mood:'thinking'};
}

// Drag-to-scroll (works even when mousewheel is swallowed by wallpaper engine)
(function(){
  let startY=0, startScroll=0, dragging=false;
  chatHistEl.addEventListener('mousedown', e=>{
    if(e.target.tagName==='BUTTON'||e.target.tagName==='INPUT') return;
    dragging=true; startY=e.clientY; startScroll=chatHistEl.scrollTop;
    chatHistEl.classList.add('dragging'); e.preventDefault();
  });
  document.addEventListener('mousemove', e=>{
    if(!dragging) return;
    chatHistEl.scrollTop = startScroll-(e.clientY-startY);
  });
  document.addEventListener('mouseup', ()=>{ dragging=false; chatHistEl.classList.remove('dragging'); });
})();

// ── FILE SEARCH ───────────────────────────────────────────────
function detectFileSearch(msg){
  const m=msg.match(/\b(?:find|locate|search\s+for|where\s+is|where'?s)\s+(?:my\s+|the\s+|a\s+)?(.+)/i);
  return m?m[1].trim():null;
}

async function handleFileSearch(query){
  try{
    const ctrl=new AbortController();
    const t=setTimeout(()=>ctrl.abort(),15000);
    const res=await fetch(`${BRIDGE_URL}/files`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      signal:ctrl.signal,
      body:JSON.stringify({query})
    });
    clearTimeout(t);
    if(res.ok){
      const data=await res.json();
      if(data.results.length===0){
        addMessage('pet',`Couldn't find anything matching "${query}" in your common folders. 😅`);
        setMood('sad',3000);
      } else {
        const lines=[`Found ${data.results.length} result${data.results.length>1?'s':''} for "${query}" 🔍`];
        data.results.forEach(f=>{
          lines.push(`${f.type==='folder'?'📁':'📄'} ${f.name}`);
          lines.push(`   └ ${f.path}`);
        });
        addMessage('pet',lines.join('\n'));
        showBubble(`Found ${data.results.length} file(s)! 📂`,3000);
        setMood('excited',3000);
      }
    } else {
      const errBody=await res.json().catch(()=>({error:'status '+res.status}));
      addMessage('pet',`File search error: ${errBody.error||res.status} 😅`);
      setMood('sad',3000);
    }
  } catch{
    addMessage('pet',"Search timed out! Is the bridge still running? 🔌");
    setMood('thinking',3000);
  }
}

async function sendMessage(){
  const msg=chatInput.value.trim(); if(!msg)return;
  chatInput.value=''; chatInput.focus();
  addMessage('user',msg);
  sendBtn.disabled=true; setMood('thinking'); showTyping();

  // intercept file search intent
  const fileQuery=detectFileSearch(msg);
  if(fileQuery){
    if(!isBridgeUp){
      addMessage('pet','File search needs the bridge running! 🔌 Start it to search your PC files.');
      setMood('thinking',3000);
    } else {
      await handleFileSearch(fileQuery);
    }
    sendBtn.disabled=false;
    return;
  }

  if(!isOnline) await new Promise(r=>setTimeout(r,400+Math.random()*500));
  const res=await getAIResponse(msg);
  const short=res.text.length>110?res.text.slice(0,107)+'…':res.text;
  showBubble(short,6000);
  addMessage('pet',res.text);
  setMood(res.mood||'happy',5000);
  sendBtn.disabled=false;
}
chatInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});

const BRIDGE_URL='http://localhost:7842';
const PROBE_TIMEOUT_MS=1500;
let isOnline=false;   // bridge up AND Claude key set
let isBridgeUp=false; // bridge up (regardless of Claude key)

function updateModeIndicator(){
  const dot=document.querySelector('.mode-dot');
  const lbl=document.querySelector('.mode-label');
  if(!dot||!lbl)return;
  if(isOnline){
    dot.style.background='#69ff47';dot.style.boxShadow='0 0 8px #69ff47';

  }

async function probeConnection(){
  try{
    const ctrl=new AbortController();
    const t=setTimeout(()=>ctrl.abort(),PROBE_TIMEOUT_MS);
    const res=await fetch(`${BRIDGE_URL}/health`,{signal:ctrl.signal});
    clearTimeout(t);
    const data=await res.json();
    const was=isOnline;
    isBridgeUp=data.status==='ok';
    isOnline=isBridgeUp&&data.claude===true;
    if(!was&&isOnline) showBubble('Connected to Claude AI! 🤖✨',4000);
    if(was&&!isOnline) showBubble('Switched to offline mode 🌙',3000);
  } catch{isOnline=false;isBridgeUp=false;}

}

function getTimeOfDay(){
  const h=new Date().getHours();
  return h<12?'morning':h<17?'afternoon':h<21?'evening':'night';
}

async function getAIResponse(msg){
  if(isOnline){
    try{
      const ctrl=new AbortController();
      const t=setTimeout(()=>ctrl.abort(),20000);
      const res=await fetch(`${BRIDGE_URL}/chat`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        signal:ctrl.signal,
        body:JSON.stringify({
          message:msg,
          history:getChatHistory(),
          context:{mood:currentMood,time_of_day:getTimeOfDay(),pet_name:getActivePet()?.name||'Pixel'}
        })
      });
      clearTimeout(t);
      if(res.ok){const data=await res.json();return{text:data.text,mood:data.mood||'happy'};}
    } catch{/* fall through */}
  }
  return getResponse(msg);
}

//  HARDWARE MONITOR
// ══════════════════════════════════════════════════
let lastHW=null;
let hwAlerted=false;

function barColor(pct){
  if(pct>85) return '#ff5555';
  if(pct>70) return '#ffcc44';
  return '#d966ff';
}

function setBar(barId,valId,pct,label){
  const bar=document.getElementById(barId);
  const val=document.getElementById(valId);
  if(!bar||!val)return;
  bar.style.width=Math.min(pct,100)+'%';
  bar.style.background=barColor(pct);
  val.textContent=label;
}

function renderHardware(hw){
  const panel=document.getElementById('hw-panel');
  if(!panel)return;
  panel.classList.add('visible');

  setBar('hw-cpu-bar','hw-cpu-val',hw.cpu.load,
    hw.cpu.temp!=null?`${hw.cpu.load}%  ${hw.cpu.temp}°C`:`${hw.cpu.load}%`);

  setBar('hw-ram-bar','hw-ram-val',hw.ram.percent,
    `${hw.ram.used}/${hw.ram.total} GB`);

  const gpuRow=document.getElementById('hw-gpu-row');
  if(hw.gpu&&hw.gpu.length>0&&hw.gpu[0].load!=null){
    gpuRow.style.display='flex';
    const g=hw.gpu[0];
    setBar('hw-gpu-bar','hw-gpu-val',g.load,
      g.temp!=null?`${g.load}%  ${g.temp}°C`:`${g.load}%`);
  } else {
    gpuRow.style.display='none';
  }

  if(hw.disk){
    setBar('hw-disk-bar','hw-disk-val',hw.disk.percent,
      `${hw.disk.used}/${hw.disk.total} GB`);
  }
}

function checkHWAlerts(hw){
  if(hwAlerted)return;
  if(hw.cpu.load>90){
    showBubble('Whoa! CPU is maxed out! 🔥 Close some apps?',4500);
    setMood('surprised',3500); hwAlerted=true;
    setTimeout(()=>hwAlerted=false,60000);
  } else if(hw.ram.percent>90){
    showBubble('RAM is almost full! 😮 Maybe close some tabs?',4500);
    setMood('surprised',3500); hwAlerted=true;
    setTimeout(()=>hwAlerted=false,60000);
  } else if(hw.gpu&&hw.gpu[0]&&hw.gpu[0].temp>85){
    showBubble(`GPU is running HOT at ${hw.gpu[0].temp}°C! 🌡️`,4500);
    setMood('surprised',3500); hwAlerted=true;
    setTimeout(()=>hwAlerted=false,60000);
  }
}

async function fetchHardware(){
  try{
    const ctrl=new AbortController();
    const t=setTimeout(()=>ctrl.abort(),2000);
    const res=await fetch(`${BRIDGE_URL}/hardware`,{signal:ctrl.signal});
    clearTimeout(t);
    if(res.ok){
      const hw=await res.json();
      lastHW=hw;
      renderHardware(hw);
      checkHWAlerts(hw);
    }
  } catch{/* bridge not running — panel stays hidden */}
}

function formatHWMessage(hw){
  const lines=[`🖥️ Here's your system right now:`];
  lines.push(`CPU: ${hw.cpu.load}%${hw.cpu.temp!=null?' @ '+hw.cpu.temp+'°C':''}`);
  lines.push(`RAM: ${hw.ram.used} / ${hw.ram.total} GB (${hw.ram.percent}%)`);
  if(hw.gpu&&hw.gpu[0]){
    const g=hw.gpu[0];
    lines.push(`GPU: ${g.name}${g.load!=null?' — '+g.load+'%':''}${g.temp!=null?' @ '+g.temp+'°C':''}`);
  }
  if(hw.disk) lines.push(`Disk: ${hw.disk.used} / ${hw.disk.total} GB (${hw.disk.percent}%)`);
  return lines.join('\n');
}

async function handlePCPill(){
  addMessage('user','What are my PC stats?');
  sendBtn.disabled=true; setMood('thinking'); showTyping();
  await fetchHardware();
  if(lastHW){
    const msg=formatHWMessage(lastHW);
    showBubble('Here are your live stats! 🖥️',4000);
    addMessage('pet',msg);
    setMood('thinking',4000);
  } else {
    const msg='I can\'t see your hardware right now! Start the bridge to enable PC monitoring 🔌';
    showBubble(msg,4000);
    addMessage('pet',msg);
    setMood('thinking',3000);
  }
  sendBtn.disabled=false;
}

function hexToRgba(hex, alpha) {
  const n = parseInt(hex.replace('#',''), 16);
  return `rgba(${n>>16},${(n>>8)&255},${n&255},${alpha})`;
}

function applyAppearance(cfg) {
  const r = document.documentElement;
  const t = THEMES[cfg.theme] || THEMES.midnight;
  const accent = cfg.accent || t.accent;
  r.style.setProperty('--bg',       t.bg);
  r.style.setProperty('--surface',  t.surface);
  r.style.setProperty('--surface2', t.surface2);
  r.style.setProperty('--accent',   accent);
  r.style.setProperty('--accent2',  t.accent2);
  r.style.setProperty('--text',     t.text);
  r.style.setProperty('--text-dim', hexToRgba(t.text, 0.42));
  r.style.setProperty('--glow',     hexToRgba(accent, 0.4));
  // canvas bg
  bgGradTop = t.bgTop; bgGradBot = t.bgBot;
  bgNebulaColors = t.nebula;
  const sc = t.stars;
  STARS.forEach(s => { s.col = sc[0|Math.random()*sc.length]; });
  NEBULAS.forEach(n => { n.col = bgNebulaColors[0|Math.random()*bgNebulaColors.length]; });
  // font
  const font = cfg.font || 'Nunito';
  document.body.style.fontFamily = `'${font}', sans-serif`;
  // chat opacity
  const op = cfg.chatOpacity !== undefined ? cfg.chatOpacity : 0.97;
  const rgb = `${parseInt(t.bg.slice(1,3),16)},${parseInt(t.bg.slice(3,5),16)},${parseInt(t.bg.slice(5,7),16)}`;
  r.style.setProperty('--chat-panel-bg', `rgba(${rgb},${op})`);
}

function saveAppearance(cfg) {
  localStorage.setItem(APPEARANCE_KEY, JSON.stringify(cfg));
}

function loadAppearanceCfg() {
  try { return JSON.parse(localStorage.getItem(APPEARANCE_KEY)) || {}; } catch(e) { return {}; }
}

function initAppearance() {
  const cfg = loadAppearanceCfg();
  if (!cfg.theme) cfg.theme = 'midnight';
  if (!cfg.font)  cfg.font  = 'Nunito';
  if (cfg.chatOpacity === undefined) cfg.chatOpacity = 0.97;

      applyAppearance(cfg); saveAppearance(cfg);
    };
    grid.appendChild(btn);
  });

  // Build font grid
  const fg = document.getElementById('font-grid');
  fg.innerHTML = '';
  FONTS.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'font-btn' + (cfg.font === f.id ? ' active' : '');
    btn.textContent = f.label;
    btn.style.fontFamily = `'${f.id}', sans-serif`;
    btn.dataset.fontId = f.id;
    btn.onclick = () => {
      cfg.font = f.id;
      fg.querySelectorAll('.font-btn').forEach(b => b.classList.toggle('active', b.dataset.fontId === f.id));
      applyAppearance(cfg); saveAppearance(cfg);
    };
    fg.appendChild(btn);
  });

  // Sync controls
  document.getElementById('ap-accent').value = cfg.accent || THEMES[cfg.theme]?.accent || '#d966ff';
  document.getElementById('ap-chat-opacity').value = cfg.chatOpacity;

  document.getElementById('appearance-overlay').classList.add('open');
}

function closeAppearance() {
  appearanceOpen = false;
  document.getElementById('appearance-overlay').classList.remove('open');
}

function onAccentChange(val) {
  const cfg = loadAppearanceCfg();
  cfg.accent = val;
  applyAppearance(cfg); saveAppearance(cfg);
}

function onChatOpacityChange(val) {
  const cfg = loadAppearanceCfg();
  cfg.chatOpacity = parseFloat(val);
  applyAppearance(cfg); saveAppearance(cfg);
}

// ══════════════════════════════════════════════════
//  SETTINGS
// ══════════════════════════════════════════════════
let settingsPanelOpen = false;
const SETTINGS_KEY = 'widgetSettings';

function loadSettings() {
  try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {}; } catch(e) { return {}; }
}

function applySettings() {
  const s = {
    clock:  document.getElementById('tog-clock').checked,
    hw:     document.getElementById('tog-hw').checked,
    chat:   document.getElementById('tog-chat').checked,
    bubble: document.getElementById('tog-bubble').checked,
  };
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
  document.getElementById('clock-widget').style.display = s.clock ? '' : 'none';
  document.getElementById('hw-panel').style.display     = s.hw    ? '' : 'none';
  document.getElementById('chat-panel').style.display      = s.chat ? '' : 'none';
  document.getElementById('chat-bubble-btn').style.display = s.chat ? '' : 'none';
  document.getElementById('pill-row').style.display = s.bubble ? '' : 'none';
}

function initSettings() {
  const s = loadSettings();
  if (s.clock  === false) document.getElementById('tog-clock').checked  = false;
  if (s.hw     === false) document.getElementById('tog-hw').checked     = false;
  if (s.chat   === false) document.getElementById('tog-chat').checked   = false;
  if (s.bubble === false) document.getElementById('tog-bubble').checked = false;
  applySettings();
}

function toggleSettings() {
  settingsPanelOpen = !settingsPanelOpen;
  document.getElementById('settings-panel').classList.toggle('open', settingsPanelOpen);
  if (settingsPanelOpen) {
    const wi = document.getElementById('display-w-input');
    if (wi) wi.value = displayW;
    const hi = document.getElementById('display-h-input');
    if (hi) hi.value = displayH;
  }
}

document.addEventListener('click', e => {
  if (settingsPanelOpen &&
      !e.target.closest('#settings-panel') &&
      !e.target.closest('#settings-btn')) {
    settingsPanelOpen = false;
    document.getElementById('settings-panel').classList.remove('open');
  }
});

function dismissBubble() {
  clearTimeout(bubTimer);
  bubbleEl.classList.remove('visible');
}

// ══════════════════════════════════════════════════
//  PET FREE MOVEMENT
// ══════════════════════════════════════════════════
const PET_W = 200, PET_H = 320;
let petX, petY, petTargetX, petTargetY, nextWanderTime = 0;
let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
let petMouseNear = false;

document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

function getChatRect() {
  if (!chatOpen) return null;
  const el = document.getElementById('chat-panel');
  return el ? el.getBoundingClientRect() : null;
}

function overlapsChat(x, y, cr) {
  if (!cr) return false;
  const margin = 20;
  return x < cr.right + margin &&
         x + PET_W > cr.left - margin &&
         y + PET_H > cr.top - margin;
}

function pickWanderTarget() {
  const pad = 60, w = Math.min(window.innerWidth, displayW), h = Math.min(window.innerHeight, displayH);
  const cr = getChatRect();
  let attempts = 0;
  do {
    petTargetX = pad + Math.random() * (w - PET_W - pad * 2);
    petTargetY = pad + Math.random() * (h - PET_H - pad * 2);
    attempts++;
  } while (overlapsChat(petTargetX, petTargetY, cr) && attempts < 20);
  nextWanderTime = Date.now() + 8000 + Math.random() * 14000;
}

function updatePetMovement() {
  if (Date.now() >= nextWanderTime) pickWanderTarget();
  const cx = petX + PET_W / 2, cy = petY + PET_H / 2 - 40;
  const mdx = mouseX - cx, mdy = mouseY - cy;
  const mdist = Math.sqrt(mdx * mdx + mdy * mdy);
  const wasNear = petMouseNear;
  petMouseNear = mdist < 220;
  if (petMouseNear && !wasNear && currentMood === 'happy') setMood('excited', 2000);
  let tx = petTargetX, ty = petTargetY;
  if (petMouseNear) {
    const angle = Math.atan2(mdy, mdx);
    tx = mouseX - Math.cos(angle) * 110 - PET_W / 2;
    ty = mouseY - Math.sin(angle) * 110 - (PET_H / 2 - 40);
  }
  const speed = petMouseNear ? 0.05 : 0.012;
  petX += (tx - petX) * speed;
  petY += (ty - petY) * speed;
  petX = Math.max(10, Math.min(Math.min(window.innerWidth, displayW) - PET_W - 10, petX));
  petY = Math.max(100, Math.min(Math.min(window.innerHeight, displayH) - PET_H - 10, petY));
  // Push pet away from chat panel if overlapping
  const cr = getChatRect();
  if (cr && overlapsChat(petX, petY, cr)) {
    const pushRight = window.innerWidth - PET_W - 10;
    petX += (pushRight - petX) * 0.08;
    petTargetX = pushRight;
  }
  document.getElementById('pet-zone').style.transform =
    `translate(${Math.round(petX)}px,${Math.round(petY)}px)`;
}

// ══════════════════════════════════════════════════
//  MAIN LOOP + BOOT
// ══════════════════════════════════════════════════
function mainLoop(ts){
  requestAnimationFrame(mainLoop);
  updatePetMovement();
  drawBg(ts/1000); drawPet(ts);
  // Animate mini-preview canvases in the selector
  if(selectorOpen){
    const s=120/160;
    (window.PET_REGISTRY||[]).forEach(pet=>{
      if(pet._previewCtx){
        const c=pet._previewCtx;
        c.save(); c.scale(s,s); pet.draw(c,ts,'happy'); c.restore();
      }
    });
  }
}

window.addEventListener('load',()=>{
  setDisplayWidth(displayW);
  setDisplayHeight(displayH);
  // Init pet position (bottom-right, then starts wandering after 3s)
  petX = Math.min(window.innerWidth, displayW) - PET_W - 24;
  petY = Math.min(window.innerHeight, displayH) - PET_H - 10;
  petTargetX = petX; petTargetY = petY;
  nextWanderTime = Date.now() + 3000;

  initSettings();
  initAppearance();

  // Apply saved pet state
  (function initPet(){
    const pet=getActivePet();
    if(pet){
      document.getElementById('name-tag').textContent=pet.nameTagText;
      document.getElementById('chat-input').placeholder=pet.inputPlaceholder;
      const bubbleEmoji = document.getElementById('chat-bubble-emoji');
      if (bubbleEmoji) bubbleEmoji.textContent = pet.avatarEmoji;
      const headerName = document.getElementById('chat-header-name');
      if (headerName) headerName.textContent = pet.name;
    }
  })();

  setTimeout(()=>{
    const pet=getActivePet();
    if(!pet) return;
    const hr=new Date().getHours();
    const g=pet.greetings;
    const pool=hr<12?g.am:hr<17?g.pm:hr<21?g.eve:g.night;
    const greeting=pick(pool);
    showBubble(greeting,5000); setMood('excited',3000);
    addMessage('pet',greeting);
    addMessage('pet',pet.introText);
  },700);
  // Probe after greeting settles; keep polling every 30s
  setTimeout(probeConnection,1500);
  setInterval(probeConnection,30000);
  // Hardware: first fetch after 2s, then every 5s
  setTimeout(fetchHardware,2000);
  setInterval(fetchHardware,5000);
  scheduleIdle();
  mainLoop(performance.now());
});
</script>
